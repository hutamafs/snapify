name: Snapify CI & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      SVC_ID: snapify
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Login to Railway
        run: railway login --token ${{ secrets.RAILWAY_API_TOKEN }}

      - name: Link to Railway project
        run: railway link --project snapify

      - name: Deploy to Railway
        run: railway deploy --service snapify
